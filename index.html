<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文學習助手</title>
    <style>
        body { font-family: sans-serif; background: #fdfaf5; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border: 1px solid #d4c4a8; }
        h2 { color: #5d4037; text-align: center; border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #8d6e63; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        #result { margin-top: 20px; padding: 15px; background: #f1ede7; border-radius: 8px; line-height: 1.7; color: #3e2723; white-space: pre-wrap; min-height: 50px; }
    </style>
</head>
<body>
<div class="container">
    <h2>墨香 · 古文小導師</h2>
    <textarea id="userInput" placeholder="輸入你想學習的文言文..."></textarea>
    <button id="btn" onclick="start()">開始解析</button>
    <div id="result">等待輸入中...</div>
</div>

<script>
    async function start() {
        const key = "AIzaSyAK5PsZBBgmqhHIaQdZZhupo5fKO-S2sZg"; // 這裡已經幫你填好了
        const input = document.getElementById('userInput').value;
        const res = document.getElementById('result');
        if (!input.trim()) return alert("請輸入內容");

        res.innerText = "正在分析中，請稍候...";
        
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是一位國文老師，請幫我將這段文言文翻譯成白話文，並解釋裡面重要的字詞： " + input }] }]
                })
            });

            const data = await response.json();
            if (data.error) {
                res.innerText = "錯誤訊息：" + data.error.message;
            } else {
                res.innerText = data.candidates[0].content.parts[0].text;
            }
        } catch (e) {
            res.innerText = "連線失敗，請稍後再試。";
        }
    }
</script>
</body>
</html>
