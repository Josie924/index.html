<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文學習助手</title>
    <style>
        body { font-family: sans-serif; background: #fdfaf5; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border: 1px solid #d4c4a8; }
        h2 { color: #5d4037; text-align: center; border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #8d6e63; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        #result { margin-top: 20px; padding: 15px; background: #f1ede7; border-radius: 8px; line-height: 1.7; color: #3e2723; white-space: pre-wrap; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h2>墨香 · 古文學習</h2>
    <textarea id="userInput" placeholder="輸入文言文（如：學而時習之）..."></textarea>
    <button id="btn" onclick="start()">開始學習解析</button>
    <div id="result">準備就緒，請輸入文字。</div>
</div>

<script>
    async function start() {
        // 使用你提供的最新金鑰
        const key = "AIzaSyAK5PsZBBgmqhHIaQdZZhupo5fKO-S2sZg"; 
        const input = document.getElementById('userInput').value;
        const res = document.getElementById('result');
        if (!input.trim()) return alert("請輸入內容");

        res.innerText = "老師正在翻閱典籍中...";
        
        try {
            // 使用 Gemini 1.5 Flash 模型，反應最快
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是一位精通古文的國文老師，請翻譯這段文字並解析重點字詞： " + input }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                // 如果失敗，這行會顯示具體原因（例如 API KEY 無效或配額限制）
                res.innerHTML = `<span style="color:red">【診斷訊息】</span><br>狀態：${data.error.status}<br>原因：${data.error.message}`;
            } else {
                res.innerText = data.candidates[0].content.parts[0].text;
            }
        } catch (e) {
            res.innerText = "連線失敗，請檢查 iPad 的網路是否順暢。";
        }
    }
</script>
</body>
</html>
