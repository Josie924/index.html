
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文言文翻譯器</title>
    <style>
        body { font-family: 'PingFang TC', serif; background: #fdfaf5; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; border: 1px solid #d4c4a8; }
        h2 { color: #5d4037; text-align: center; letter-spacing: 2px; border-bottom: 1px solid #d4c4a8; padding-bottom: 15px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 12px; background: #8d6e63; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
        .result-title { margin-top: 25px; font-weight: bold; color: #8d6e63; }
        #result { margin-top: 10px; padding: 15px; background: #f1ede7; border-radius: 6px; min-height: 80px; line-height: 1.6; color: #3e2723; }
    </style>
</head>
<body>

<div class="container">
    <h2>墨香 · 文言翻譯</h2>
    <textarea id="userInput" placeholder="輸入白話文（轉文言）或文言文（轉白話）..."></textarea>
    <button id="btn" onclick="startTranslate()">點此轉換</button>
    
    <div class="result-title">翻譯結果：</div>
    <div id="result">等待輸入中...</div>
</div>

<script>
    async function startTranslate() {
        // --- 請在這裡填入你的 API Key ---
        const API_KEY = "AIzaSyAK5PsZBBgmqhHIaQdZZhupo5fKO-S2sZg";
        // ------------------------------

        const text = document.getElementById('userInput').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('btn');

        if (!text) return alert("請輸入文字！");
        if (API_KEY === "YOUR_GEMINI_API_KEY") return alert("請先填入 API Key 喔！");

        resultDiv.innerText = "正在研墨撰稿中...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你是一位精通古漢語的文學家。請將以下文字進行翻譯：如果是白話文請轉為文言文，如果是文言文請轉為白話文。只輸出翻譯後的文字，不要有額外解釋。內容如下：${text}` }] }]
                })
            });

            const data = await response.json();
            const translatedText = data.candidates[0].content.parts[0].text;
            resultDiv.innerText = translatedText;
        } catch (error) {
            resultDiv.innerText = "發生錯誤，請檢查 API Key 或網路。";
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
