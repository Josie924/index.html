<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文言文學習小導師</title>
    <style>
        body { font-family: 'PingFang TC', serif; background: #fdfaf5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 600px; border: 1px solid #d4c4a8; }
        h2 { color: #5d4037; text-align: center; border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 15px; background: #8d6e63; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
        .result-title { margin-top: 25px; font-weight: bold; color: #5d4037; border-left: 4px solid #8d6e63; padding-left: 10px; }
        #result { margin-top: 10px; padding: 20px; background: #f1ede7; border-radius: 8px; line-height: 1.8; color: #3e2723; white-space: pre-wrap; font-size: 17px; }
    </style>
</head>
<body>

<div class="container">
    <h2>墨香 · 古文陪讀</h2>
    <p style="color: #795548; font-size: 14px;">請輸入欲學習的文言文段落：</p>
    <textarea id="userInput" placeholder="例如：學而時習之，不亦說乎？"></textarea>
    <button id="btn" onclick="startTranslate()">解析古文</button>
    
    <div class="result-title">解析報告：</div>
    <div id="result">請輸入內容並按下解析...</div>
</div>

<script>
    async function startTranslate() {
        const API_KEY = "AIzaSyAK5PsZBBgmqhHIaQdZZhupo5fKO-S2sZg"; 
        const text = document.getElementById('userInput').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('btn');

        if (!text.trim()) return alert("請先輸入文言文段落喔！");

        resultDiv.innerText = "正在研讀卷軸，請稍候...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你是一位精通漢語史的老師。請針對以下文言文進行教學解析：
1. 【白話翻譯】：精準流暢的現代漢語。
2. 【字詞註釋】：挑出3-5個重點字詞進行詳細解釋。
3. 【意涵賞析】：用一句話點出這段文字的深意。
內容如下：${text}` }] }]
                })
            });

            const data = await response.json();
            if (data.error) {
                resultDiv.innerText = "【錯誤】" + data.error.message;
            } else {
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            }
        } catch (error) {
            resultDiv.innerText = "連線失敗，請檢查網路。";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
